apiVersion: apps/v1
kind: Deployment
metadata:
  name: hcl-playground-development
  labels:
    app: hcl-playground-development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hcl-playground-development
  template:
    metadata:
      labels:
        app: hcl-playground-development
    spec:
      containers:
      - name: hcl-playground-development
        image: {{IMAGE_NAME}}
        ports:
        - containerPort: 8080
        volumeMounts:
          - name: hcl-playground-volume
            mountPath: /scratch
          - name: tmp
            mountPath: /tmp
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            # Bounds engine memory (we deliberately don't set RLIMIT_AS on the
            # Go binaries) and CPU per pod.
            cpu: "1"
            memory: "1Gi"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
          seccompProfile:
            type: RuntimeDefault
      initContainers:
        - name: fs-owner-change
          image: busybox
          command: [ 'sh', '-c', 'chown root:1000 /scratch && chmod 775 /scratch' ]
          volumeMounts:
            - name: hcl-playground-volume
              mountPath: /scratch
      securityContext:
        fsGroup: 1000
      volumes:
        - name: hcl-playground-volume
          persistentVolumeClaim:
              claimName: efs-pvc
        - name: tmp
          emptyDir: {}
