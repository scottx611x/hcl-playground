<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <title>HCL Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.46.0/min/vs/loader.min.js"></script>
</head>
<body data-default-engine="{{ default_engine }}" data-frozen="{{ 1 if frozen else 0 }}">
    <header class="topbar">
        <a class="brand" href="/">
            <span class="brand-mark">{ }</span>
            <span class="brand-name">HCL Playground</span>
        </a>

        <div class="controls">
            <div class="engine-toggle" id="engineToggle" role="tablist" aria-label="Engine">
                <button type="button" class="engine-btn is-active" data-engine="terraform" role="tab">Terraform</button>
                <button type="button" class="engine-btn" data-engine="tofu" role="tab">OpenTofu</button>
            </div>
            <select id="versionSelect" aria-label="Version"></select>
            <div class="menu">
                <button type="button" class="ghost-btn" id="examplesBtn" aria-haspopup="true" aria-expanded="false">Examples ▾</button>
                <ul class="menu-list" id="examplesMenu" hidden></ul>
            </div>
            <button type="button" class="ghost-btn" id="shareBtn" title="Copy a shareable link">Share</button>
            <button type="button" class="run-btn" id="runBtn" title="Run (⌘/Ctrl+Enter)">▶ Run</button>
            <a class="github-link" href="https://github.com/scottx611x/hcl-playground" target="_blank" rel="noopener" aria-label="GitHub">
                <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </div>
    </header>

    <main class="workspace">
        <section class="pane editor-pane">
            <div class="pane-head">Input</div>
            <div id="editor"></div>
        </section>
        <section class="pane output-pane">
            <div class="pane-head">
                Output
                <button type="button" class="copy-btn" id="copyBtn" title="Copy output">Copy</button>
            </div>
            <pre id="output" class="output" aria-live="polite"><span class="muted">Hit Run to evaluate your HCL.</span></pre>
        </section>
    </main>

    <footer class="site-footer">
        <span>HCL &amp; OpenTofu expression playground &middot; offline <code>console</code>, no providers.</span>
        <span>By <a href="https://github.com/scottx611x" target="_blank" rel="noopener">Scott Ouellette</a> &middot; <a href="/about">about</a> &middot; <a href="https://github.com/scottx611x/hcl-playground" target="_blank" rel="noopener">source</a></span>
    </footer>

    <script id="versions-data" type="application/json">{{ versions|tojson }}</script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
